<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="/" class="logo">
          <span class="logo-icon">🛍️</span>
          <span class="logo-text">TechStore</span>
        </a>
        <nav class="nav">
          <a href="#products" class="nav-link">Products</a>
        </nav>
        <button class="cart-btn" id="cart-toggle">
          <span class="cart-icon">🛒</span>
          <span class="cart-count" id="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <div class="container">
        <h1 class="hero-title">TechStore</h1>
        <p class="hero-subtitle">Shop the latest tech products</p>
      </div>
    </section>

    <section class="products-section" id="products">
      <div class="container">
        <h2 class="section-title">Products</h2>
        <div class="products-grid" id="products-grid"></div>
      </div>
    </section>
  </main>

  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h2>Shopping Cart</h2>
      <button class="close-btn" id="cart-close">&times;</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer" id="cart-footer"></div>
  </aside>

  <div class="modal-overlay" id="checkout-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Checkout</h2>
        <button class="close-btn" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="checkout-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com">
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" required placeholder="+91 9999999999">
          </div>
          <div class="form-group">
            <label for="address">Shipping Address</label>
            <textarea id="address" name="address" required placeholder="Enter your full address"></textarea>
          </div>
          <div class="order-summary" id="order-summary"></div>
          <button type="submit" class="btn btn-primary btn-block" id="pay-btn">Place Order</button>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="js/app.js"></script>
</body>
</html>
